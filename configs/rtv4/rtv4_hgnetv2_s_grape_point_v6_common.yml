__include__: [
  './rtv4_hgnetv2_s_grape_point_v2.yml'
]

output_dir: ./outputs/grape_point_v6_common

point_checkpointing:
  enabled: True
  grape_class_name: grape
  alpha: 0.35
  beta: 0.20
  point_error_norm_px: 40.0

RTv4Criterion:
  weight_dict:
    loss_mal: 1
    loss_bbox: 5
    loss_giou: 2
    loss_fgl: 0.15
    loss_ddf: 1.5
    loss_has_picking: 1.2
    loss_picking_offset: 4.0
  losses: ['mal', 'boxes', 'local', 'has_picking', 'picking_offset']
  gamma: 1.5
  point_loss_type: wing
  wing_loss_omega: 0.25
  wing_loss_epsilon: 0.05
  point_coord_weight_x: 1.0
  point_coord_weight_y: 1.0

DFINETransformer:
  use_picking_point_head: True
  has_picking_head_layers: 3
  picking_offset_head_layers: 3
  point_head_hidden_scale: 1.0
  point_instance_binding_mode: none
  point_offset_activation: identity
  point_offset_min: -0.25
  point_offset_max: 1.25

PostProcessor:
  use_picking_point: True
  has_picking_threshold: 0.5
  point_offset_mode: center

