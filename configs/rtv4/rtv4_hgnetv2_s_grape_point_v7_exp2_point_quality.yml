__include__: [
  './rtv4_hgnetv2_s_grape_point_v7_exp2.yml'
]

output_dir: ./outputs/grape_point_v7_exp2_point_quality

DFINETransformer:
  use_point_quality_head: True
  point_quality_head_layers: 2

RTv4Criterion:
  weight_dict:
    loss_mal: 1
    loss_bbox: 5
    loss_giou: 2
    loss_fgl: 0.15
    loss_ddf: 1.5
    loss_has_picking: 1.2
    loss_picking_offset: 4.0
    loss_point_quality: 0.5
  losses: ['mal', 'boxes', 'local', 'has_picking', 'picking_offset', 'point_quality']
  point_quality_tau: 30.0
  point_quality_offset_mode: top_center
  point_quality_top_anchor_ratio: 0.12
