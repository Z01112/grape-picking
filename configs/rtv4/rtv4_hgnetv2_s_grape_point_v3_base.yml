__include__: [
  './rtv4_hgnetv2_s_grape_point_base.yml'
]

output_dir: ./outputs/grape_point_v3_base

point_checkpointing:
  enabled: True
  grape_class_name: grape
  alpha: 0.35
  beta: 0.20
  point_error_norm_px: 40.0

point_training_schedule:
  phase2:
    enabled: True
    start_epoch: 72
    weight_multipliers:
      loss_bbox: 0.95
      loss_giou: 0.95
      loss_fgl: 0.95
      loss_ddf: 0.95
      loss_has_picking: 1.10
      loss_picking_offset: 1.20

train_dataloader:
  dataset:
    regenerate_point_offsets: True
    point_offset_mode: top_center
    point_top_anchor_ratio: 0.12

val_dataloader:
  dataset:
    regenerate_point_offsets: True
    point_offset_mode: top_center
    point_top_anchor_ratio: 0.12

DFINETransformer:
  use_picking_point_head: True
  has_picking_head_layers: 3
  picking_offset_head_layers: 3
  point_head_hidden_scale: 1.0
  point_local_feature_fusion: True
  point_local_feature_level: 0
  point_local_pool_size: 5
  point_local_width_scale: 1.10
  point_local_height_scale: 0.82
  point_local_top_shift: 0.14
  point_fusion_head_layers: 2
  point_size_condition: True

PostProcessor:
  use_picking_point: True
  has_picking_threshold: 0.5
  point_offset_mode: top_center
  point_top_anchor_ratio: 0.12

RTv4Criterion:
  weight_dict:
    loss_mal: 1
    loss_bbox: 5
    loss_giou: 2
    loss_fgl: 0.15
    loss_ddf: 1.5
    loss_has_picking: 1.2
    loss_picking_offset: 3.8
  losses: ['mal', 'boxes', 'local', 'has_picking', 'picking_offset']
  gamma: 1.5
  point_loss_type: wing
  wing_loss_omega: 0.25
  wing_loss_epsilon: 0.05
  point_coord_weight_x: 1.0
  point_coord_weight_y: 1.30
  point_small_grape_area_threshold: 0.04
  point_small_grape_weight: 1.35
