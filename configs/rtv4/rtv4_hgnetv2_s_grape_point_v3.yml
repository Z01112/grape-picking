__include__: [
  './rtv4_hgnetv2_s_grape_point_v3_base.yml'
]

output_dir: ./outputs/grape_point_v3_main
print_freq: 50
checkpoint_freq: 4
epoches: 100
use_amp: True

train_dataloader:
  total_batch_size: 8
  num_workers: 0
  dataset:
    transforms:
      ops:
        - {type: RandomPhotometricDistort, p: 0.5}
        - {type: RandomZoomOut, fill: 114}
        - {type: Resize, size: [640, 640]}
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
        - {type: ConvertBoxes, fmt: 'cxcywh', normalize: True}
      policy:
        name: stop_epoch
        epoch: 72
        ops: ['RandomPhotometricDistort', 'RandomZoomOut']
      mosaic_prob: 0.0

  collate_fn:
    type: BatchImageCollateFunction
    base_size: 640
    base_size_repeat: ~
    stop_epoch: 72
    mixup_prob: 0.0
    mixup_epochs: [0, 0]

val_dataloader:
  total_batch_size: 8
  num_workers: 0
  dataset:
    transforms:
      ops:
        - {type: Resize, size: [640, 640]}
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
