__include__: [
  './rtv4_hgnetv2_s_grape_picking_base.yml'
]

# Common knobs you may want to edit directly here.
output_dir: ./outputs/baseline_main
print_freq: 50
checkpoint_freq: 4
epoches: 100
use_amp: True

train_dataloader:
  total_batch_size: 8
  num_workers: 0

  dataset:
    transforms:
      ops:
        - {type: RandomPhotometricDistort, p: 0.5}
        - {type: RandomZoomOut, fill: 114}
        - {type: RandomIoUCrop, p: 0.8}
        - {type: SanitizeBoundingBoxes, min_size: 1}
        - {type: RandomHorizontalFlip}
        - {type: Resize, size: 639, max_size: 640}
        - {type: PadToSize, size: [640, 640], fill: 114}
        - {type: SanitizeBoundingBoxes, min_size: 1}
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
        - {type: ConvertBoxes, fmt: 'cxcywh', normalize: True}
      policy:
        name: stop_epoch
        epoch: 72
        ops: ['RandomPhotometricDistort', 'RandomZoomOut', 'RandomIoUCrop']
      mosaic_prob: 0.0

  collate_fn:
    type: BatchImageCollateFunction
    base_size: 640
    base_size_repeat: 3
    stop_epoch: 72
    mixup_prob: 0.0
    mixup_epochs: [0, 0]

val_dataloader:
  total_batch_size: 8
  num_workers: 0
  dataset:
    transforms:
      ops:
        - {type: Resize, size: 639, max_size: 640}
        - {type: PadToSize, size: [640, 640], fill: 114}
        - {type: ConvertPILImage, dtype: 'float32', scale: True}

