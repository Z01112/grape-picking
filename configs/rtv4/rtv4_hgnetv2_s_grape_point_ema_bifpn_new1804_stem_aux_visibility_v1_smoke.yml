__include__: [
  ./rtv4_hgnetv2_s_grape_point_ema_bifpn_new1804_fair100.yml
]

output_dir: ./outputs/04_diagnostics/stem_aux_visibility_v1_smoke
use_ema: false
epoches: 1

DFINETransformer:
  use_stem_aux: true
  stem_aux_type: visibility
  stem_aux_loss_weight: 0.2
  stem_aux_input: query
  stem_aux_debug: true
  use_dpo_head: false
  use_qdpt_lite: false
  use_c2f_ccr: false
  use_toproi_simcc_refiner: false
  use_toproi_heatmap_refiner: false
  use_grouped_picking_query: false
  use_point_reliability_head: false
  use_point_selector_head: false
  use_point_accept_head: false

RTv4Criterion:
  weight_dict:
    loss_vfl: 1
    loss_bbox: 5
    loss_giou: 2
    loss_fgl: 0.15
    loss_ddf: 1.5
    loss_mal: 1
    loss_distill: 10.0
    loss_has_picking: 1.2
    loss_picking_offset: 4.0
    loss_has_stem: 0.2
  losses: [mal, boxes, local, has_picking, picking_offset, has_stem]
